# =============================================================================
# 実験設定 (頻繁に変更)
# =============================================================================

# --- 環境 / アルゴリズム選択 ---
env_name: "drp_env:drp-4agent_map_8x5-v2"
#env_name: "drp_env:drp-5agent_map_8x5-v2"
agent_num: 4
map_name: "map_8x5"
task_assigner: "tp"
path_planner: "qmix"
method_tag: ""

# --- 実行制御 ---
time_limit: 1000
test_num: 1000
# タスク割当の選択肢・結果を stdout に出力 (実際に何かを割当てたステップだけ)
debug_task_assign: False
# PPO タスク割当の学習打ち切りステップ数 (累積環境ステップ).
# このステップを超えたら learning ループを抜けて test_num 回の推論ループへ移行.
# -1 を指定すると src/epymarl/src/config/default.yaml の t_max と同じ値が使われる
# (経路計画の MARL 学習ステップと揃える用途).
running_steps: -1

# =============================================================================
# LaRe-Path (System A: 経路計画用) - 利用設定
# =============================================================================

# 利用フラグ
use_lare_path: false
use_lare_path_training: true        # false: デコーダだけ学習、報酬は置換しない (検証用)

# Pretrained モード (ロード + 凍結 / 推論専用)
use_pretrained_lare_path: false
pretrained_lare_path_model_name: null

# Finetuning モード (ロード + 学習継続)
use_finetuning_lare_path: false
finetuning_lare_path_model_name: null

# 自動保存
lare_path_autosave: false
lare_path_autosave_path: null       # null なら自動命名 (下部の命名規則参照)

# =============================================================================
# LaRe-Task (System B: タスク割当用) - 利用設定
# =============================================================================

use_lare_task: false
use_lare_task_training: true

use_pretrained_lare_task: false
pretrained_lare_task_model_name: null

use_finetuning_lare_task: false
finetuning_lare_task_model_name: null

lare_task_autosave: false
lare_task_autosave_path: null

# =============================================================================
# 学習ハイパーパラメータ (基本固定)
# =============================================================================

# --- PPO (タスク割当) ---
n_envs: 8
buffer_size: 1024
batch_size: 64
epochs: 4
learning_rate: 0.0003
gamma: 0.99
gae_lambda: 0.95
clip_epsilon: 0.2
entropy_coef: 0.0001
value_loss_coef: 0.5

# --- LaRe-Path 内部 ---
lare_path_factor_dim: 10            # 10-element evaluation_func, Safe-TSL-DBCT 互換
lare_path_decoder_hidden_dim: 64
lare_path_decoder_n_layers: 3
lare_path_use_transformer: false    # AREL Time-Agent Transformer (オプション)
lare_path_transformer_heads: 4
lare_path_transformer_depth: 2
lare_path_buffer_capacity: 1024       # MARL4DRP の単一メモリ運用 (use_separete_memory=False) に整合
lare_path_min_buffer: 256
lare_path_update_freq: 128          # MARL4DRP 整合: 128 ep ごとに評価期間トリガ. その期間中 train_epochs (= dataclass で 50) 個の連続 ep で 1 step ずつ更新
lare_path_batch_size: 256             # MARL4DRP の `rewardbatch_size=256` に整合. 小さい batch だと loss が大きく振動して proxy 報酬が QMIX に悪影響を与える
lare_path_lr: 0.0005
lare_path_save_freq_steps: 500000   # 累積環境ステップ 0.5M ごとに 1 回保存 (= 学習頻度とは独立)
lare_path_save_dir: null            # deprecated: 旧 saved_models/ 用 (load の後方互換のみ). 新規 autosave は src/lare/path/checkpoints/ 固定

# --- LaRe-Task 内部 ---
lare_task_factor_dim: 10
lare_task_decoder_hidden_dim: 64
lare_task_decoder_n_layers: 2
lare_task_buffer_capacity: 1024       # Path 側と同じ理由 (MARL4DRP に整合)
lare_task_min_buffer: 256
lare_task_update_freq: 128          # MARL4DRP 整合 (Path 側と対称)
lare_task_batch_size: 256             # Path 側と同じ理由 (MARL4DRP に整合)
lare_task_lr: 0.0005
lare_task_save_freq_steps: 500000   # 0.5M ごとに保存 (= Path 側と同じ)
lare_task_save_dir: null            # deprecated: 旧 saved_models/ 用 (load の後方互換のみ). 新規 autosave は src/lare/task/checkpoints/ 固定

# =============================================================================
# 命名規則・参考情報 (読むだけ)
# =============================================================================
# モデル保存ファイル名:
#   scratch:    "{Safe_}{ALGO}_{PATH|TASK}_{map}_{N}agents_{X.X}M_checkpoint.pth"
#   finetuning: "FT_{Safe_}{source_base}_{map}_{N}agents_{X.X}M_checkpoint.pth"
# - Safe_   = "Safe_" when SafeEnv (drp_safe-...) else 空 (先頭 _ も省略)
# - ALGO    = --config=qmix 等の CLI を大文字化 (検出失敗時は UNKNOWN)
# - {X.X}M  = 累積ステップ数 (100万単位)
#
# ディレクトリ構成 (固定):
#   src/lare/path/
#     ├── checkpoints/   ← autosave 出力 (大量蓄積, .gitignore)
#     └── models/        ← pretrained/finetuning ロード元 (整理済み, git 公開)
#   src/lare/task/  ← Path と同じ構造
#
# pretrained / finetuning モデルパスの解決順:
#   1. 絶対パス
#   2. カレントディレクトリ相対
#   3. リポジトリルート相対
#   4. src/lare/{path,task}/models/      ← 正規の置き場
#   5. src/lare/{path,task}/checkpoints/ ← autosave 出力からも直接読込可能
#   6. src/lare/{path,task}/saved_models/ ← 旧パス (後方互換)
#   いずれも .pth 拡張子無しで指定可
